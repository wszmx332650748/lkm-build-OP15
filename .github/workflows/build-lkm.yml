name: Build PathMask for All KMI Targets
on:
  push:
    branches:
      - main
      - 'dev/**'
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build-lkm:
    strategy:
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    uses: ./.github/workflows/ddk-lkm.yml
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: '20260313'

  publish-release:
    name: Publish module zips to GitHub Release
    needs: build-lkm
    # Only main / v* tags publish a Release. Dev branches (dev/**) and
    # pull requests still get build artifacts via actions/upload-artifact
    # but never push a Release that would notify end users.
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    # Both `main` push and `v*` tag push race for the rolling
    # pathmask-latest tag (force-update). When a release commit is
    # tagged immediately after merging to main, the two publish jobs
    # collide and one of them exits 1 on the `git push origin
    # refs/tags/pathmask-latest --force` step, leaving a confusing red
    # cross on the Actions dashboard. Serialise per-ref-context so
    # only one publish-release runs at a time, and let the most
    # recent push win when both are pending.
    #
    #   group:                serialises across both refs
    #   cancel-in-progress:   when a tag push arrives while the main
    #                         push is mid-publish, drop the main one
    #                         (the tag push produces a strict superset
    #                         of its outputs anyway).
    concurrency:
      group: publish-release
      cancel-in-progress: true
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Prepare release assets
        run: |
          mkdir -p release-upload
          find release-assets -type f -name '*_pathmask.ko' -exec cp {} release-upload/ \;

          found_ko=0
          for ko in release-upload/*_pathmask.ko; do
            [ -e "$ko" ] || continue
            found_ko=1
            base="$(basename "$ko" _pathmask.ko)"
            update_json_url="https://raw.githubusercontent.com/Andrea-lyz/LKM-PathMask/main/update/${base}.json"
            UPDATE_JSON_URL="$update_json_url" sh ./tools/package_ksu.sh "$ko" "release-upload/${base}_pathmask-ksu.zip"
          done

          if [ "$found_ko" -eq 0 ]; then
            echo "No PathMask .ko artifacts found." >&2
            exit 1
          fi

          ls -la release-upload

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine primary release target.
          # - On a tag push (refs/tags/v*) we publish to the immutable
          #   tag release AND mirror to the rolling pathmask-latest
          #   release, so update.json clients (which point at
          #   pathmask-latest) always get assets matching the most
          #   recent tagged commit.
          # - On a main push we only publish to pathmask-latest.
          # In both cases publish_targets is a space-separated list of
          # release tags to receive identical assets.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            PRIMARY_TAG="${GITHUB_REF_NAME}"
            PUBLISH_TARGETS="${PRIMARY_TAG} pathmask-latest"
          else
            PRIMARY_TAG="pathmask-latest"
            PUBLISH_TARGETS="pathmask-latest"
            # Force-move the rolling tag onto the new commit so the
            # release page shows the right SHA.
            git tag -f "pathmask-latest" "$GITHUB_SHA"
            git push origin "refs/tags/pathmask-latest" --force
          fi

          NOTES="Automated PathMask build for ${GITHUB_SHA}."

          for TAG in $PUBLISH_TARGETS; do
            if [ "$TAG" = "pathmask-latest" ]; then
              TITLE="PathMask latest"
              PRERELEASE_FLAG="--prerelease"
            else
              TITLE="PathMask ${TAG}"
              PRERELEASE_FLAG=""
            fi

            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release edit "$TAG" \
                --title "$TITLE" \
                --notes "$NOTES" \
                $PRERELEASE_FLAG \
                --latest=false \
                --draft=false
            else
              gh release create "$TAG" \
                --title "$TITLE" \
                --notes "$NOTES" \
                $PRERELEASE_FLAG \
                --latest=false
            fi

            gh release upload "$TAG" release-upload/* --clobber
          done
