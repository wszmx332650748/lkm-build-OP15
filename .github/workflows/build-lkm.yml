name: Build PathMask for All KMI Targets
on:
  push:
    branches:
      - main
      - 'dev/**'
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lkm:
    strategy:
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    uses: ./.github/workflows/ddk-lkm.yml
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: '20260313'

  publish-release:
    name: Publish module zips to GitHub Release
    needs: build-lkm
    # Only main / v* tags publish a Release. Dev branches (dev/**) and
    # pull requests still get build artifacts via actions/upload-artifact
    # but never push a Release that would notify end users.
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Prepare release assets
        run: |
          mkdir -p release-upload
          find release-assets -type f -name '*_pathmask.ko' -exec cp {} release-upload/ \;

          found_ko=0
          for ko in release-upload/*_pathmask.ko; do
            [ -e "$ko" ] || continue
            found_ko=1
            base="$(basename "$ko" _pathmask.ko)"
            update_json_url="https://raw.githubusercontent.com/Andrea-lyz/LKM-PathMask/main/update/${base}.json"
            UPDATE_JSON_URL="$update_json_url" sh ./tools/package_ksu.sh "$ko" "release-upload/${base}_pathmask-ksu.zip"
          done

          if [ "$found_ko" -eq 0 ]; then
            echo "No PathMask .ko artifacts found." >&2
            exit 1
          fi

          ls -la release-upload

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            TITLE="PathMask ${GITHUB_REF_NAME}"
            PRERELEASE_FLAG=""
          else
            TAG="pathmask-latest"
            TITLE="PathMask latest"
            PRERELEASE_FLAG="--prerelease"
            git tag -f "$TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$TAG" --force
          fi

          NOTES="Automated PathMask build for ${GITHUB_SHA}."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES" $PRERELEASE_FLAG --latest=false --draft=false
          else
            gh release create "$TAG" --title "$TITLE" --notes "$NOTES" $PRERELEASE_FLAG --latest=false
          fi

          gh release upload "$TAG" release-upload/* --clobber
